# Product identity rules are used only for same-company deduplication.
# The strict product name is preserved; these terms create conservative fallback keys.

company_stem_suffixes:
  - 손해보험
  - 생명보험
  - 생명
  - 화재
  - 손보

channel_prefixes:
  - 삼성 인터넷
  - 삼성인터넷
  - 삼성 다이렉트
  - 삼성다이렉트
  - 인터넷
  - 다이렉트
  - 모바일
  - 온라인

legal_noise_terms:
  - 무배당
  - 무 배당
  - 보험상품
  - 보험 상품

optional_leading_modifiers:
  - 신간편
  - 크루
  - CREW
  - HI
  - Hi
  - hi
  - 하이
  - NEW
  - New
  - new
  - 뉴
  - 더
  - The
  - THE
  - the
  - 시그니처
  - Signature
  - SIGNATURE
  - signature

# These prefixes can be omitted only when the remaining name has a strong anchor
# such as a version number, numeric marker, or English code. This prevents broad
# names like "시그니처 여성 건강보험" from collapsing into "여성건강보험".
anchor_required_leading_modifiers:
  - HI
  - Hi
  - hi
  - 하이
  - NEW
  - New
  - new
  - 뉴
  - 더
  - The
  - THE
  - the
  - 시그니처
  - Signature
  - SIGNATURE
  - signature

optional_class_before_version:
  - 건강보험

generic_loose_keys:
